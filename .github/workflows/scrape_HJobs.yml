name: Auto Update HiringCafe Jobs Excel

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: auto-job-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-excel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas lxml openpyxl pytz cloudscraper

      - name: Run Python Scraper
        env:
          HJ_TELEGRAM_BOT_TOKEN: ${{ secrets.HJ_TELEGRAM_BOT_TOKEN }}
          HJ_TELEGRAM_CHAT_ID: ${{ secrets.HJ_TELEGRAM_CHAT_ID }}
        run: |
          python HJobsScript.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add hiring_cafe_jobs.xlsx

          git diff --staged --quiet || git commit -m "Auto-update jobs - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          git push origin HEAD:main --force
